name: Update Rules

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Commit changes
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add sr_*_custom.conf
          git commit -m "auto update rules" || echo "no change"
          git push
