name: Update Rules

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run merge
        run: |
          chmod +x merge.sh
          ./merge.sh

      - name: Commit
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add .
          git commit -m "auto update rules" || echo "no change"
          git push
